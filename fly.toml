# fly.toml — rustvani voice agent
# Region: Mumbai (bom) for lowest latency to Indian users

app = "realapp1"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# WebSocket keep-alive — voice agents need long-lived connections
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

# Upgrade HTTP → WebSocket
[[http_service.checks]]
  grace_period = "5s"
  interval = "15s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"

# Media flows P2P over WebRTC (relayed via TURN), not through the Fly proxy, so
# no UDP service is declared here. Only the signaling WebSocket uses http_service.

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
